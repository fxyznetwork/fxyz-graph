name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first: workspace packages resolve each other via their built dist/.
      - name: Build
        run: pnpm -r run build

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test
        run: pnpm -r run test
